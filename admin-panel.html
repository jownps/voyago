function Badge({status}){
  const map={
    Novo:{bg:'#edf6f9',color:'#2980b9'},
    Contactado:{bg:'#fef9ec',color:'#c9a96e'},
    Proposta:{bg:'#fff3e0',color:'#e67e22'},
    Ganho:{bg:'#eafaf1',color:'#27ae60'},
    Perdido:{bg:'#fdf0ef',color:'#e74c3c'},
    Parcial:{bg:'#f0ece4',color:'#8a8578'},
    Completo:{bg:'rgba(201,169,110,0.2)',color:'#c9a96e'},
    Bestseller:{bg:'rgba(201,169,110,0.9)',color:'#18202e'},
    Popular:{bg:'rgba(201,169,110,0.7)',color:'#18202e'},
    Novo2:{bg:'rgba(39,174,96,0.15)',color:'#27ae60'},
    Premium:{bg:'rgba(24,32,46,0.85)',color:'#c9a96e'},
    admin:{bg:'rgba(201,169,110,0.2)',color:'#c9a96e'},
    user:{bg:'#f0ece4',color:'#8a8578'},
    Ativo:{bg:'#eafaf1',color:'#27ae60'},
    Inativo:{bg:'#fdf0ef',color:'#e74c3c'},
  };
  const s=map[status]||{bg:'#f0f0f0',color:'#666'};
  return <span style={{...adminStyles.badge,background:s.bg,color:s.color}}>{status}</span>;
}

function Toggle({on, onChange}){
  return (
    <label style={adminStyles.toggle} onClick={e=>e.stopPropagation()}>
      <input type="checkbox" checked={on} onChange={onChange} style={adminStyles.toggleInput}/>
      <span style={{...adminStyles.toggleSlider,...(on?adminStyles.toggleSliderOn:{})}}>
        <span style={{...adminStyles.toggleKnob,...(on?adminStyles.toggleKnobOn:{})}}></span>
      </span>
    </label>
  );
}

// ── LINE CHART ──────────────────────────────────────────
function LineChart({data, color='#c9a96e', color2='#18202e', h=160}){
  const w=560, pad=32;
  const maxY=Math.max(...data.map(d=>Math.max(d.qualificados||0,d.parciais||0)),1);
  const pts1=data.map((d,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=h-pad-(d.qualificados/maxY)*(h-pad*2);
    return `${x},${y}`;
  }).join(' ');
  const pts2=data.map((d,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=h-pad-(d.parciais/maxY)*(h-pad*2);
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:h}}>
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".2"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient>
      </defs>
      {[0,0.25,0.5,0.75,1].map((t,i)=>(
        <line key={i} x1={pad} y1={h-pad-t*(h-pad*2)} x2={w-pad} y2={h-pad-t*(h-pad*2)} stroke="#e8e3da" strokeWidth="1"/>
      ))}
      {data.map((d,i)=>{
        const x=pad+(i/(data.length-1))*(w-pad*2);
        return <text key={i} x={x} y={h-6} textAnchor="middle" fontSize={9} fill="#b0a898">{d.label}</text>;
      })}
      <polygon points={`${pad},${h-pad} ${pts1} ${w-pad},${h-pad}`} fill="url(#g1)"/>
      <polyline points={pts1} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      <polyline points={pts2} fill="none" stroke={color2} strokeWidth="1.5" strokeLinejoin="round" strokeDasharray="4,3"/>
      {data.map((d,i)=>{
        const x=pad+(i/(data.length-1))*(w-pad*2);
        const y=h-pad-(d.qualificados/maxY)*(h-pad*2);
        return <circle key={i} cx={x} cy={y} r="3" fill={color} stroke="#fff" strokeWidth="1.5"/>;
      })}
    </svg>
  );
}

// ── BAR CHART ───────────────────────────────────────────
function BarChart({data, color='#c9a96e'}){
  const max=Math.max(...data.map(d=>d.val),1);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {data.map((d,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:11,color:'#8a8578',width:90,flexShrink:0}}>{d.label}</span>
          <div style={{flex:1,background:'#f0ece4',borderRadius:3,height:10,overflow:'hidden'}}>
            <div style={{width:`${(d.val/max)*100}%`,background:color,height:'100%',borderRadius:3,transition:'width 0.8s ease'}}/>
          </div>
          <span style={{fontSize:11,color:'#5a5449',width:24,textAlign:'right'}}>{d.val}</span>
        </div>
      ))}
    </div>
  );
}

// ── MINI SPARKLINE ──────────────────────────────────────
function Sparkline({data,color='#c9a96e'}){
  const w=60,h=28,pad=4;
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=h-pad-(v/max)*(h-pad*2);
    return `${x},${y}`;
  }).join(' ');
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/></svg>;
}

// ── PIPELINE PAGE ──────────────────────────────────────
function PipelinePage(){
  const cols=['Novo','Contactado','Proposta','Ganho','Perdido'];
  const colColors={Novo:'#e8f4fd',Contactado:'#fef9ec',Proposta:'#fff3e0',Ganho:'#eafaf1',Perdido:'#fdf0ef'};
  const colText={Novo:'#2980b9',Contactado:'#c9a96e',Proposta:'#e67e22',Ganho:'#27ae60',Perdido:'#e74c3c'};
  const [board,setBoard]=useState(PIPELINE_DATA);
  const [drag,setDrag]=useState(null);

  const onDragStart=(card,col)=>setDrag({card,col});
  const onDrop=(targetCol)=>{
    if(!drag||drag.col===targetCol)return;
    const src=[...board[drag.col].filter(c=>c.id!==drag.card.id)];
    const dst=[...board[targetCol],drag.card];
    setBoard({...board,[drag.col]:src,[targetCol]:dst});
    setDrag(null);
  };

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:400,color:'#18202e',marginBottom:4}}>Pipeline de vendas</h1>
        <p style={{fontSize:12,color:'#8a8578'}}>Arrasta os cartões para mover entre estados. As alterações guardam-se automaticamente.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,alignItems:'start'}}>
        {cols.map(col=>(
          <div key={col} onDragOver={e=>e.preventDefault()} onDrop={()=>onDrop(col)}
            style={{background:'#faf8f4',borderRadius:10,border:'1px solid #e8e3da',minHeight:400}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderBottom:'1px solid #e8e3da',background:colColors[col],borderRadius:'10px 10px 0 0'}}>
              <span style={{fontSize:11,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:colText[col]}}>{col}</span>
              <span style={{fontSize:12,color:colText[col],fontWeight:600}}>{board[col].length}</span>
            </div>
            <div style={{padding:10,display:'flex',flexDirection:'column',gap:8}}>
              {board[col].map(card=>(
                <div key={card.id} draggable onDragStart={()=>onDragStart(card,col)}
                  style={{background:'#fff',borderRadius:8,padding:'12px 14px',border:'1px solid #ece8e0',cursor:'grab',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:500,color:'#2c2c2c'}}>{card.nome}</span>
                    <Icon name="drag" size={14} color="#d0c8bc"/>
                  </div>
                  {card.email&&<div style={{fontSize:11,color:'#8a8578',display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
                    <span style={{color:'#c9a96e'}}>✉</span> {card.email}
                  </div>}
                  {card.tel&&<div style={{fontSize:11,color:'#8a8578',display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
                    <span>☎</span> {card.tel}
                  </div>}
                  {card.destino&&<div style={{fontSize:11,marginTop:6,display:'flex',alignItems:'center',gap:5}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:'#c9a96e',display:'inline-block'}}/>
                    <span style={{color:'#5a5449'}}>{card.destino}</span>
                  </div>}
                  <div style={{fontSize:10,color:'#b0a898',marginTop:8}}>{card.data}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>

}

// ── GUIAS PAGE ─────────────────────────────────────────
function GuiasPage(){
  const [guias,setGuias]=useState(INITIAL_GUIAS);
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null); // null | {mode:'new'|'edit', data}
  const empty={cidade:'',pais:'',continente:'Europa',tema:'Cidade',badge:'Popular',preco:19.90,ativo:true,img:'',ordem:99,descricao:''};
  const [form,setForm]=useState(empty);

  const filtered=guias.filter(g=>!search||(g.cidade.toLowerCase().includes(search.toLowerCase())||g.pais.toLowerCase().includes(search.toLowerCase())));

  const openNew=()=>{setForm(empty);setModal({mode:'new'});};
  const openEdit=g=>{setForm({...g});setModal({mode:'edit',id:g.id});};
  const save=()=>{
    if(modal.mode==='new') setGuias(prev=>[...prev,{...form,id:Date.now()}]);
    else setGuias(prev=>prev.map(g=>g.id===modal.id?{...form,id:modal.id}:g));
    setModal(null);
  };
  const remove=id=>setGuias(prev=>prev.filter(g=>g.id!==id));
  const toggle=id=>setGuias(prev=>prev.map(g=>g.id===id?{...g,ativo:!g.ativo}:g));

  return (
    <div>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24}}>

          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:400,color:'#18202e',marginBottom:4}}>Guias de viagem</h1>

          <tbody>
            {filtered.map(g=>(
              <tr key={g.id} style={{cursor:'default'}} onMouseEnter={e=>e.currentTarget.style.background='#faf8f4'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={adminStyles.td}>{g.img&&<img src={g.img} alt={g.cidade} style={{width:44,height:36,objectFit:'cover',borderRadius:4}}/>}</td>

                <td style={adminStyles.td}><Toggle on={g.ativo} onChange={()=>toggle(g.id)}/></td>
                <td style={adminStyles.td}>
                  <div style={{display:'flex',gap:6}}>
                    <button style={adminStyles.iconBtn} onClick={()=>openEdit(g)}><Icon name="edit" size={14} color="#8a8578"/></button>
                    <button style={adminStyles.btnDanger} onClick={()=>remove(g.id)}><Icon name="trash" size={14} color="#e74c3c"/></button>

              <div style={adminStyles.formGroup}><label style={adminStyles.label}>Cidade *</label><input style={adminStyles.input} value={form.cidade} onChange={e=>setForm({...form,cidade:e.target.value})}/></div>

            <div style={adminStyles.formGroup}><label style={adminStyles.label}>Descrição</label><textarea style={adminStyles.textarea} value={form.descricao||''} onChange={e=>setForm({...form,descricao:e.target.value})}/></div>

              <div style={adminStyles.formGroup}>
                <label style={adminStyles.label}>Ordem</label>
                <input style={{...adminStyles.input,width:80}} type="number" value={form.ordem} onChange={e=>setForm({...form,ordem:parseInt(e.target.value)||99})}/>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>

          <BarChart data={sources.map(s=>({label:s.source,val:s.val}))} color="#c9a96e"/>
        </div>
      </div>
    </div>
  );
}

// ── UTILIZADORES PAGE ──────────────────────────────────
function UtilizadoresPage(){
  const [users,setUsers]=useState(USERS);
  const [invite,setInvite]=useState('');
  const doInvite=()=>{
    if(invite.includes('@')){
      setUsers(prev=>[...prev,{id:Date.now(),email:invite,nome:'',role:'user',estado:'Ativo',criado:'24 abr 2026'}]);
      setInvite('');
      alert('Convite enviado! Uma janela com o link de definição de password foi aberta — copie ou envie por email.');
    }
  };
  const toggleRole=(id)=>setUsers(prev=>prev.map(u=>u.id===id?{...u,role:u.role==='admin'?'user':'admin'}:u));
  const removeUser=(id)=>setUsers(prev=>prev.filter(u=>u.id!==id));

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:400,color:'#18202e',marginBottom:4}}>Equipa &amp; permissões</h1>
        <p style={{fontSize:12,color:'#8a8578'}}>Convida membros para o painel admin ou remove acessos.</p>
      </div>
      <div style={{...adminStyles.card,marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,color:'#c9a96e'}}>
          <Icon name="invite" size={16} color="#c9a96e"/>
          <span style={{fontWeight:500,fontSize:13}}>Convidar novo administrador</span>
        </div>
        <div style={{display:'flex',gap:10}}>
          <input style={{...adminStyles.input,flex:1}} type="email" value={invite} onChange={e=>setInvite(e.target.value)} placeholder="email@dominio.com" onKeyDown={e=>e.key==='Enter'&&doInvite()}/>
          <button style={adminStyles.btnPrimary} onClick={doInvite}>Convidar</button>
        </div>
        <p style={{fontSize:11,color:'#b0a898',marginTop:10}}>Após convidar, abre-se uma janela com o link de definição de password — copie ou envie por email.</p>
      </div>
      <div style={adminStyles.card}>
        <div style={{fontWeight:500,marginBottom:16}}>Membros ({users.length})</div>
        <table style={adminStyles.table}>
          <thead><tr>{['Email','Papéis','Estado','Criado','Ações'].map(h=><th key={h} style={adminStyles.th}>{h}</th>)}</tr></thead>
          <tbody>{users.map(u=>(
            <tr key={u.id} onMouseEnter={e=>e.currentTarget.style.background='#faf8f4'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <td style={adminStyles.td}>
                <div style={{fontWeight:500}}>{u.email}</div>
                {u.nome&&<div style={{fontSize:11,color:'#8a8578'}}>{u.nome}</div>}
              </td>
              <td style={adminStyles.td}>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <Badge status={u.role}/>
                  {u.role==='admin'&&<Badge status="admin"/>}
                </div>
              </td>
              <td style={adminStyles.td}><Badge status={u.estado}/></td>
              <td style={adminStyles.tdMuted}>{u.criado}</td>
              <td style={adminStyles.td}>
                {u.id!==1&&(
                  <div style={{display:'flex',gap:8}}>
                    <button style={{...adminStyles.btnSecondary,padding:'4px 10px',fontSize:11}} onClick={()=>toggleRole(u.id)}>
                      {u.role==='admin'?'↓ Remover admin':'↑ Tornar admin'}
                    </button>
                    <button style={adminStyles.btnDanger} onClick={()=>removeUser(u.id)}><Icon name="trash" size={13} color="#e74c3c"/></button>
                  </div>
                )}
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

      <div>

      </div>

}

// ── ALERTAS PAGE ────────────────────────────────────────
function AlertasPage(){
  const [alertas,setAlertas]=useState([
    {id:1,tipo:'info',msg:'Nova lead qualificada: Roberto Almeida — Japão',time:'há 2 min',lida:false},
    {id:2,tipo:'success',msg:'Guia "Paris" atingiu 50 vendas este mês',time:'há 1 hora',lida:false},
    {id:3,tipo:'warning',msg:'Lead "João Pereira" mudou para Perdido',time:'há 3 horas',lida:true},
    {id:4,tipo:'info',msg:'Novo lead parcial: Mariana Oliveira',time:'há 5 horas',lida:true},
    {id:5,tipo:'success',msg:'Reserva confirmada: Ana Paula & Rafael — Maldivas',time:'há 1 dia',lida:true},
  ]);
  const cores={info:{bg:'#edf6f9',color:'#2980b9'},success:{bg:'#eafaf1',color:'#27ae60'},warning:{bg:'#fff3e0',color:'#e67e22'},danger:{bg:'#fdf0ef',color:'#e74c3c'}};
  const marcarLida=id=>setAlertas(prev=>prev.map(a=>a.id===id?{...a,lida:true}:a));
  const naoLidas=alertas.filter(a=>!a.lida).length;
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:400,color:'#18202e',marginBottom:4}}>Alertas</h1>
          <p style={{fontSize:12,color:'#8a8578'}}>{naoLidas} não lidos</p>
        </div>
        <button style={adminStyles.btnSecondary} onClick={()=>setAlertas(prev=>prev.map(a=>({...a,lida:true})))}>Marcar todos como lidos</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {alertas.map(a=>{
          const c=cores[a.tipo];
          return (
            <div key={a.id} style={{...adminStyles.card,display:'flex',alignItems:'center',gap:16,opacity:a.lida?0.6:1,borderLeft:`3px solid ${c.color}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:'#2c2c2c',fontWeight:a.lida?400:500}}>{a.msg}</div>
                <div style={{fontSize:11,color:'#b0a898',marginTop:4}}>{a.time}</div>
              </div>
              {!a.lida&&<button style={{...adminStyles.btnSecondary,padding:'5px 12px',fontSize:11}} onClick={()=>marcarLida(a.id)}>Marcar lida</button>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [leads,setLeads]=useState(INITIAL_LEADS);
  const [searchQ,setSearchQ]=useState('');

  if(!user) return <LoginPage onLogin={setUser}/>;

  const renderPage=()=>{
    switch(page){
      case 'dashboard': return <DashboardPage leads={leads}/>;
      case 'leads': return <LeadsPage leads={leads} setLeads={setLeads}/>;
      case 'clientes': return <ClientesPage leads={leads}/>;
      case 'pipeline': return <PipelinePage/>;
      case 'guias': return <GuiasPage/>;
      case 'receita': return <ReceitaPage leads={leads}/>;
      case 'analytics': return <AnalyticsPage/>;
      case 'alertas': return <AlertasPage/>;
      case 'utilizadores': return <UtilizadoresPage/>;
      case 'definicoes': return <DefinicoesPage/>;
      case 'pacotes': return <PlaceholderPage title="Pacotes" subtitle="Gestão de pacotes de viagem personalizados" icon="packages"/>;
      case 'monitoramento': return <PlaceholderPage title="Monitorização" subtitle="Uptime, performance e logs do sistema" icon="monitoring"/>;
      case 'relatorios': return <PlaceholderPage title="Relatórios" subtitle="Relatórios exportáveis em PDF e Excel" icon="reports"/>;
      case 'integracoes': return <PlaceholderPage title="Integrações" subtitle="Stripe, Mailchimp, WhatsApp API, Google Analytics" icon="integrations"/>;
      default: return <DashboardPage leads={leads}/>;
    }
  };

  return (
    <div style={adminStyles.layout}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={adminStyles.main}>
        <Header user={user} onLogout={()=>setUser(null)} searchQ={searchQ} setSearchQ={setSearchQ}/>
        <div style={adminStyles.content}>{renderPage()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
